[project]
name = "madtitan-contracts"
version = "0.1.0"
description = "Shared schema contracts for MadTitan Bestiary."
requires-python = ">=3.11"
dependencies = ["pydantic>=2"]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/madtitan_contracts"]
